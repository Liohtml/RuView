<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareSignal — Pflegedashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #1a1a2e; color: #eee; min-height: 100vh; }
    header { background: #16213e; padding: 16px 24px;
             display: flex; justify-content: space-between; align-items: center;
             border-bottom: 1px solid #0f3460; }
    header h1 { font-size: 1.3rem; font-weight: 600; color: #e8e8e8; }
    #meta { font-size: 0.8rem; opacity: 0.6; }
    #badge { padding: 4px 12px; border-radius: 12px; font-size: 0.75rem;
             font-weight: bold; margin-left: 12px; color: white; }
    .online  { background: #27ae60; }
    .offline { background: #e74c3c; }
    #node-count { font-size: 0.8rem; opacity: 0.6; margin-left: 16px; }
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; }

    .card { background: #16213e; border-radius: 14px; padding: 20px;
            border-left: 6px solid #333; transition: all 0.5s ease;
            position: relative; overflow: hidden; }
    .card.ok     { border-left-color: #27ae60; }
    .card.alarm  { border-left-color: #e74c3c; animation: pulse 1.5s infinite; }
    .card.absent { border-left-color: #555; }

    @keyframes pulse {
      0%,100% { box-shadow: 0 2px 8px rgba(0,0,0,.2); }
      50%      { box-shadow: 0 2px 24px rgba(231,76,60,.5); }
    }

    .room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .room-name { font-size: 1.05rem; font-weight: 600; }
    .motion-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .dot-active  { background: #27ae60; box-shadow: 0 0 8px #27ae60; animation: glow 1.5s infinite; }
    .dot-still   { background: #f39c12; box-shadow: 0 0 6px #f39c12; }
    .dot-absent  { background: #555; }
    .dot-alarm   { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; animation: glow 0.8s infinite; }

    @keyframes glow {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .label { font-size: .85rem; font-weight: 500; padding: 3px 12px;
             border-radius: 10px; display: inline-block; }
    .l-ok     { background: rgba(39,174,96,.15); color: #27ae60; }
    .l-alarm  { background: rgba(231,76,60,.15); color: #e74c3c; }
    .l-absent { background: rgba(100,100,100,.15); color: #888; }
    .l-still  { background: rgba(243,156,18,.15); color: #f39c12; }

    .motion-label { font-size: .75rem; color: #888; margin-bottom: 6px; }
    .activity-bar { height: 6px; border-radius: 3px; background: #2a2a4a; overflow: hidden; margin-bottom: 12px; }
    .activity-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease, background 0.5s ease; }
    .fill-active { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .fill-still  { background: linear-gradient(90deg, #f39c12, #e67e22); }
    .fill-absent { background: #555; }
    .fill-alarm  { background: linear-gradient(90deg, #e74c3c, #c0392b); }

    .room-meta { font-size: .72rem; color: #666; display: flex; justify-content: space-between; }

    footer { text-align: center; padding: 20px; font-size: .7rem; color: #444; }
  </style>
</head>
<body>
<header>
  <h1>CareSignal Pflegedashboard</h1>
  <div style="display:flex;align-items:center">
    <span id="meta">Lade...</span>
    <span id="node-count"></span>
    <span id="badge" class="offline">Offline</span>
  </div>
</header>
<main><div id="grid"></div></main>
<footer>CareSignal — WiFi-Sensing Pflegemonitoring</footer>
<script>
  const STATUS_URL = "/caresignal_status.json";
  const POLL_MS = 3000;

  const MOTION = {
    active:        { text: "Bewegung erkannt",  lbl: "l-ok",    dot: "dot-active", fill: "fill-active", pct: 90 },
    present_still: { text: "Anwesend — still",  lbl: "l-still", dot: "dot-still",  fill: "fill-still",  pct: 40 },
    absent:        { text: "Nicht erkannt",      lbl: "l-absent",dot: "dot-absent", fill: "fill-absent", pct: 5 },
  };

  const STATUS_LABELS = {
    ok:     { text: "OK",    cls: "l-ok" },
    alarm:  { text: "ALARM", cls: "l-alarm" },
    absent: { text: "Leer",  cls: "l-absent" },
  };

  function fmt(iso) {
    if (!iso) return "\u2014";
    const d = new Date(iso);
    return d.toLocaleTimeString("de-DE", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
  }
  function ago(iso) {
    if (!iso) return "";
    const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (s < 5) return "jetzt";
    if (s < 60) return `vor ${s}s`;
    if (s < 3600) return `vor ${Math.floor(s/60)} Min`;
    return `vor ${Math.floor(s/3600)} Std`;
  }
  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  async function poll() {
    try {
      const res = await fetch(STATUS_URL + "?t=" + Date.now());
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();

      document.getElementById("badge").textContent = "Online";
      document.getElementById("badge").className = "online";
      document.getElementById("meta").textContent = "Stand: " + fmt(data.updated_at);
      document.getElementById("node-count").textContent = `${(data.rooms||[]).length} Zimmer`;

      document.getElementById("grid").innerHTML = (data.rooms || []).map(r => {
        const m = MOTION[r.motion_level] || MOTION.absent;
        const st = STATUS_LABELS[r.status] || STATUS_LABELS.absent;
        const dotCls = r.status === "alarm" ? "dot-alarm" : m.dot;
        const fillCls = r.status === "alarm" ? "fill-alarm" : m.fill;
        const pct = r.status === "alarm" ? 100 : m.pct;

        return `<div class="card ${esc(r.status)}">
          <div class="room-header">
            <span class="room-name">${esc(r.name)}</span>
            <span class="motion-dot ${dotCls}"></span>
          </div>
          <div class="status-row">
            <span class="label ${st.cls}">${st.text}</span>
            <span class="label ${m.lbl}">${m.text}</span>
          </div>
          <div class="motion-label">Aktivitaet</div>
          <div class="activity-bar">
            <div class="activity-fill ${fillCls}" style="width:${pct}%"></div>
          </div>
          <div class="room-meta">
            <span>${fmt(r.updated_at)}</span>
            <span>${ago(r.updated_at)}</span>
          </div>
        </div>`;
      }).join("") || "<p style='color:#666;text-align:center;margin-top:40px'>Keine Zimmer konfiguriert.</p>";
    } catch {
      document.getElementById("badge").textContent = "Offline";
      document.getElementById("badge").className = "offline";
    }
  }
  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
